name: Pylint

on: [push, pull_request]

jobs:
  build-Ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
    - name: Install perf
      run: |
        sudo apt-get install -y linux-tools-common linux-tools-generic linux-tools-azure linux-cloud-tools-azure
        if ! perf --version; then
            export PERF_PATH=$(find -L /usr/lib/linux-tools/ -name perf -type f | head -n 1)
            if [ -n "$PERF_PATH" ]; then
                sudo ln -sf "$PERF_PATH" /usr/bin/perf
            fi
        fi

        perf --version
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Run CI
      run: |
        echo '-1' | sudo tee /proc/sys/kernel/perf_event_paranoid
        sudo apt install ruby-mdl
        ci/runner.sh       
