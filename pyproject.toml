[project]
name = "amphimixis"
version = "0.2.0"
description = "Build automation and profiling tool for Linux projects across various architectures."
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
    "pandas",
    "pyyaml",
    "paramiko",
    "openai",
    "langchain-core",
    "langchain-gigachat",
]

[tool.setuptools]
py-modules = ["amixis"]
include-package-data = true

[tool.setuptools.packages.find]
include = ["amphimixis*"]

[tool.setuptools.package-data]
"amphimixis" = ["../samples/*.yml"]

[dependency-groups]
dev = [
    "pytest-mock",
    "docker",
    "testcontainers",
    "pytest",
    "ruff",
    "black",
    "mypy",
    "pylint",
    "types-paramiko",
    "types-pyyaml",
    "types-docker",
]

[tool.uv]
package = true

[tool.mypy]
disable_error_code = ["import-untyped", "annotation-unchecked"]

[tool.isort]
profile = "black"

[project.scripts]
amixis = "amixis:main"
